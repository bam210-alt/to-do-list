    <style>
        body{

     #task{
        width: 500px;

            margin: 10px 15px;

       .inputTaskbutton{
width: 360px;
height: 2rem;
margin: 10px auto;
border: 1px solid rgba(255, 255, 255, 0.539) ;
background: transparent;
color: white;
       }
       #default_sentence{
        
        padding: 1rem 6rem ;
       }
       #addTaskbutton{
        background:rgb(240, 184, 3);
        color: white;
        width: 6.5rem;
        height: 2.5rem;
        border: none;
        border-radius: 10px;
        font-weight:bold ;

        }
        .task{
            display: flex;
            position: relative;

        input[type="checkbox"]:not(:checked) {
  appearance: none;
    width: 20px;
    height: 20px;
    border: 2px solid #999;
    border-radius: 4px;

    cursor: pointer;
}


input[type="checkbox"]:checked {
    content: "✓";
    width: 20px;
    height: 20px;
    border: 2px solid #a3a304;

    color:white;
    accent-color : gold;
 }

       .edit_task{
        color: white;
        background: rgb(148, 3, 184);
        width:  4rem;
        height: 1.5rem;
        border: none;
        border-radius: 10px; 
        margin :5px;


 
       }
       .delete_task{
        color: white;
        background: rgb(228, 3, 3);
        width: 4.5rem;        
        height: 1.5rem;
        border: none;
        border-radius: 10px;
        margin :5px;
        margin-left:auto;

 
       }

        text-decoration:line-through;
        color :rgba(255, 255, 255, 0.214);
        }

</head>
<body>
    <div id="to_do">
        <h1>To-do-list</h1>
            <input type="text" placeholder="Please enter a new task" id="inputTask" required>
            <button type="button" id="addTaskbutton">Add Task</button>
        <p id="default_sentence">Aucun tache a ce moment </p>
        <div id="task_list">

        </div>
        
    </div>


    <script>
//DECLARATION VARIABLE 
        const todo =document.getElementById("to_do");
        const  addtask  =document.getElementById("addTaskbutton");
        const inputTask =document.getElementById("inputTask");
        const defaultsentence =document.getElementById("default_sentence");
        const tasklist =document.getElementById("task_list");
//FUNCTION
function recupererTaches(){
    
    const data = localStorage.getItem("Taches") ;
    return data? JSON.parse(data) : [];

}
function saveTask(taches){
    localStorage.setItem("Taches",JSON.stringify(taches));
}
function ajouterTaches(){
const tasktext =inputTask.value.trim();
if(tasktext===""){
    alert ("veuillez entrer une tache");
    return; 
}
const alltask =recupererTaches();
alltask.push(tasktext);
saveTask(alltask);
inputTask.value="";
createTask();


}
function createTask(){
tasklist.innerHTML="";

const alltask =recupererTaches();
if(alltask.length ===0){
    tasklist.appendChild(defaultsentence);
    return
}
alltask.forEach(item =>{
const div = document.createElement("div");
div.classList.add("task");

const checkbox =document.createElement('input');
checkbox.type ="checkbox";
checkbox.classList.add('checkbox');

const text =document.createElement('p');
text.textContent= item;
text.classList.add('task_text');

const editbtn =document.createElement('button');
editbtn.textContent="Edit";
editbtn.classList.add('edit_task');

const deletebtn =document.createElement('button');
deletebtn.textContent="Delete";
deletebtn.classList.add('delete_task');


div.append(checkbox,text,editbtn,deletebtn);
tasklist.appendChild (div);


if(defaultsentence){
    defaultsentence.remove();
}

})



}







addtask.addEventListener('click',()=>ajouterTaches());
// tache_number = tasklist.querySelectorAll(".task");
// moreBtn =tasklist.querySelector(".bouton");

// if(tache_number.length >= 2){
// if (!moreBtn){

// moreBtn  =document.createElement('button');
// moreBtn.textContent="Voir Plus";
// moreBtn.classList.add('edit_task','bouton');
// tasklist.appendChild(moreBtn)  }}






// EVENEMENT AU CLIC SUR LES BUTTONS(edit delete checkbox) SUR LA liste de tache 

tasklist.addEventListener('click',(e)=>{
    
    const task =e.target.closest(".task");
    if(!task)return;
    const text= task.querySelector(".task_text");
    const  editBtn=task.querySelector(".edit_task");

    
    if (e.target.classList.contains("checkbox")){
         
            text.classList.toggle("text");
            editBtn.disabled =e.target.checked;
    }


    if (e.target.closest(".delete_task")){
        const index = Array.from(tasklist.children).indexOf(task); // position de la tâche
        const alltask = recupererTaches();
        alltask.splice(index, 1);   // retire 1 élément à cet index
        saveTask(alltask);   
        task.remove();
    }


    if (e.target.closest(".edit_task")){
    const input = document.createElement("input");
    input.type = "text";
    input.value = text.textContent;
    input.classList.add('task_text');

    if(!task.classList.contains("editing")){
        text.replaceWith(input);
        input.focus();  
        task.classList.add("editing");
    }else{  
        const input= task.querySelector("input.task_text"); 
        const newtext = document.createElement("p");
        newtext.className = "task_text";
        newtext.textContent = input.value;
        input.replaceWith(newtext);
        task.classList.remove("editing");

    }
 
    }
})
createTask();
    </script>
