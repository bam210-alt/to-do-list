<body>
    <div id="task">
        <h1>To-do-list</h1>
        <form id="form">
            <input type="text" placeholder="Please enter a new task" id="inputTask" required>
            <button type="button" id="addTaskbutton">Add Task</button>
        </form>
        <p id="default_sentence">Aucun tache a ce moment </p>
        <div id="task_list">

        </div>
        
    </div>


    <script>
//DECLARATION VARIABLE 
        const  addtask  =document.getElementById("addTaskbutton");
        const inputTask =docmument.getElementById("inputTask");
        const defaultsentence =document.getElementById("default_sentence");
        const form= document.getElementById("form");

        const tasklist =document.getElementsById("task_list");



// AJOUT  D'UJNE TACHE AUNCLICK DE "AJOUTER TACHE" +AJOUT DANS LE LOClsotrage

addtask.addEventListener('click',(e)=>{
e.preventDefault();

const tasktext =inputTask.value;
if(tasktext.trim===""){
    alert ("veuillez entrer une tache");
}
else{
const div = document.createElement("div");
div.classList.add("task");

const checkbox =document.createElement('input');
checkbox.type ="checkbox";
checkbox.classList.add('checkbox');

const text =document.createElement('p');
text.textContent= tasktext;
text.classList.add('task_text');

const editbtn =document.createElement('button');
editbtn.textContent="Edit";
editbtn.classList.add('edit_task');

const deletebtn =document.createElement('button');
deletebtn.textContent="Delete";
deletebtn.classList.add('delete_task');


div.append(checkbox,text,editbtn,deletebtn);
tasklist.appendChild (div);


if(defaultsentence){
    defaultsentence.remove();
}
//LOCALSTORAGE A FAIRE APRES 




}

})

        e.target.div.remove();

    if (e.target.classList.contains("checkbox")){
         text.classList.add("text");

})
